<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Entry</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      body {
        height: 100vh;
        background: linear-gradient(135deg, #f5f7fa, #e4e8f0);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #222;
      }

      .container {
        width: 420px;
        padding: 40px 32px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(20px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        transition: all 0.3s ease;
      }

      .container:hover {
        transform: translateY(-4px);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
      }

      /* 标题闪光 */
      .title {
        font-size: 28px;
        font-weight: 600;
        margin-bottom: 24px;
        position: relative;
        overflow: hidden;
      }

      .title::after {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.8), transparent);
        animation: shine 3s infinite;
      }

      @keyframes shine {
        0% {
          left: -100%;
        }
        100% {
          left: 120%;
        }
      }

      /* 输入框 */
      .input {
        width: 100%;
        padding: 14px 16px;
        border-radius: 12px;
        border: 1px solid #e0e4ec;
        outline: none;
        font-size: 14px;
        transition: all 0.25s ease;
        background: rgba(255, 255, 255, 0.8);
      }

      .input:focus {
        border-color: #8aa4ff;
        box-shadow: 0 0 0 3px rgba(138, 164, 255, 0.15);
      }

      /* 按钮 */
      .btn {
        margin-top: 16px;
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, #8aa4ff, #6c7cff);
        color: white;
        font-size: 15px;
        cursor: pointer;
        transition: all 0.25s ease;
      }

      .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 20px rgba(108, 124, 255, 0.25);
      }

      .btn:active {
        transform: scale(0.98);
      }

      /* 底部提示 */
      .hint {
        margin-top: 14px;
        font-size: 12px;
        color: #888;
        text-align: center;
        transition: all 0.2s;
      }

      .hint:hover {
        color: #555;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="title">AI Assistant</div>

      <input class="input" placeholder="输入你的问题..." />

      <button class="btn">开始</button>

      <div class="hint">智能 · 简洁 · 高效</div>
    </div>
  </body>
</html>
